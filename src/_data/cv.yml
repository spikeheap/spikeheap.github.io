# Ryan Brooks — CV dataset
#
# Single source of truth for /cv (tech leadership default), /cv/security
# (security leadership) and /services (fractional CTO/CISO consultancy page).
#
# Filtering rule: a role/bullet renders in view X iff X is in its
# `audiences` list. Bullets keep source order. Each view picks its
# `statements.<view>` block for the personal statement and
# `skills.<view>` list for the ATS-readable keyword block.
#
# TODO markers flag items needing user confirmation before ship.

profile:
  name: Ryan Brooks
  location: Sheffield, UK (remote)
  links:
    website: https://ryanbrooks.co.uk
    mastodon: https://ruby.social/@spikeheap
    github: https://github.com/spikeheap
    linkedin: https://www.linkedin.com/in/ryanpbrooks/


statements:
  tech_leadership: |
    I'm a pragmatic, hands-on technical leader with two decades of
    experience building software, infrastructure, and the teams that
    own them. I focus on people, shared goals, figuring out what's
    most important, and making space for teams to do their best work.

    My background spans engineering, operations and security. I've led
    teams from 3 people to 30+ across central and local government,
    charities, and commercial software businesses. I'm equally
    comfortable working with executive leadership on strategy and with
    engineers in the codebase, and I use frameworks like domain-driven
    design, Team Topologies and the Government Digital Service
    Standard to ground decisions in real user needs.

  security_leadership: |
    I'm a pragmatic, hands-on leader with a focus on people, shared
    goals, figuring out what's most important, and making space to
    achieve it. My background spans operations, engineering and
    security, which makes a hands-on Chief Information Security
    Officer (CISO) role exciting.

    My experience running JavaScript, Ruby and remote hack events and
    working with executive leadership in local authorities means I'm
    well placed to work with everyone from board level to end user,
    meeting them where they are to foster a collaborative, positive
    security posture. My time in central and local government has
    given me a good understanding of vast and aging technology stacks,
    and experience wrangling them to keep risk acceptable.

    I'm an advocate of modern DevSecOps, empowering teams and risk
    owners to quantify risk and manage it effectively against other
    priorities, using established frameworks such as the NCSC Cyber
    Assessment Framework (CAF) and the CIS AWS Cloud Benchmark.

  consultancy: |
    I work with founders and leadership teams of small and mid-sized
    organisations as a fractional CTO, fractional CISO, or hands-on
    technical lead. Engagements are usually 1–2 days a week, or a
    time-boxed embedded piece of work over 3–6 months.

    The goal is to leave you with a more capable team, clearer
    priorities, and infrastructure that's safe to change — not to make
    you dependent on me.

