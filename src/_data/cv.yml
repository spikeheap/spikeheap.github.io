# Consultancy page (/services) content. Distinct structure from CV views:
# friendly intro, services, case studies (referencing experience by id),
# sector-grouped logo wall, "let's talk" CTA.
consultancy:
  intro: |
    I work with founders and leadership teams of small and mid-sized
    organisations as a fractional CTO, fractional CISO, or hands-on
    technical lead. Engagements are usually 1–2 days a week, or a
    time-boxed embedded piece of work over 3–6 months.

    The goal is to leave you with a more capable team, clearer
    priorities, and infrastructure that's safe to change — not to
    make you dependent on me.

  services:
    - title: Fractional CTO
      body: |
        Embedded technical leadership for small engineering teams
        who need someone in the room with the founders. Strategy,
        hiring, coaching engineering managers, unblocking
        architecture decisions, and being honest about what's
        working.
    - title: Fractional CISO / Head of Cyber Security
      body: |
        Build an information security capability that scales with
        you. ISMS introduction (typically aligned to ISO/IEC 27001
        or Cyber Essentials Plus), risk management, security
        engineering practice, and security culture work with both
        engineering teams and senior leadership.
    - title: ISO/IEC 27001 implementation
      body: |
        End-to-end ISMS implementation for small teams who need to
        meet a procurement bar without drowning the engineering
        team in process. Currently studying for the PECB Lead
        Auditor qualification — already a Lead Implementer in
        practice.
    - title: Infrastructure-as-code introduction
      body: |
        Pragmatic Terraform/AWS adoption for teams who've been
        clicking through the console. Patterns, modules, CI wiring,
        and the team training and review changes you'll need to
        keep it working after I leave.
    - title: Technical leadership coaching
      body: |
        1:1 coaching for engineering managers, tech leads, and new
        CTOs — usually monthly or fortnightly. Done this informally
        since 2014.

